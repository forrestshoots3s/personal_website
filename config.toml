baseURL = "https://forrestchai.com/"
languageCode = "en-us"
title = "Forrest Chai"
theme = "PaperMod"

description = "Forrest Chai - CS, Math & HCI @ Northwestern. Regeneron STS Scholar '25. Building AI products and conducting research in machine learning and mathematical modeling."

enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  description = "CS, Math & HCI @ Northwestern. Regeneron STS Scholar '25. Founding AI engineer building CrowdListen - turning social conversations into structured intelligence for AI agents."
  author = "Forrest Chai"
  env = "production"
  keywords = ["AI", "Machine Learning", "Product Engineering", "Mathematical Modeling", "CrowdListen", "Research"]
  mainSections = ["posts"]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "Welcome"
    Content = "CS, Math & HCI @ Northwestern. Regeneron STS Scholar '25. Building AI products and exploring research in machine learning."

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/forrest0921/"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/forrestshoots3s"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:forrestchai0921@gmail.com"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "product"
    name = "Product"
    url = "/product/"
    weight = 20
  [[menu.main]]
    identifier = "research"
    name = "Research"
    url = "/research/"
    weight = 25
  [[menu.main]]
    identifier = "photography"
    name = "Photography"
    url = "/photography/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Explore"
    url = "/search/"
    weight = 35
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
