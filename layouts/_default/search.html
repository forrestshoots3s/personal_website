{{- define "main" }}

<header class="page-header">
    <h1>{{- (printf "%s&nbsp;" .Title ) | htmlUnescape -}}
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </h1>
    {{- if .Description }}
    <div class="post-description">
        {{ .Description }}
    </div>
    {{- end }}
</header>

<div id="searchbox">
    <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default (printf "%s ↵" .Title) }}"
        aria-label="search" type="search" autocomplete="off" maxlength="64">
    <ul id="searchResults" aria-label="search results"></ul>
</div>

{{ with .Site.Taxonomies.tags }}
<div class="tags-section">
  <div class="tags-container">
    {{ range $name, $taxonomy := . }}
    <a href="{{ "/tags/" | relLangURL }}{{ $name | urlize }}">
      <span class="tag-badge">#{{ $name }} <span class="tag-count">({{ len $taxonomy.Pages }})</span></span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>

<script>
var fuse, resList = document.getElementById('searchResults'), sInput = document.getElementById('searchInput');

window.onload = function () {
  var xhr = new XMLHttpRequest();
  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4 && xhr.status === 200) {
      var data = JSON.parse(xhr.responseText);
      if (data) {
        fuse = new Fuse(data, {
          includeScore: true, threshold: 0.2, distance: 50, minMatchCharLength: 2,
          keys: [{ name: 'title', weight: 0.7 }, { name: 'summary', weight: 0.2 }, { name: 'content', weight: 0.1 }]
        });
      }
    }
  };
  xhr.open('GET', "../index.json");
  xhr.send();
}

sInput.onkeyup = function () {
  if (this.value.trim().length < 2) { resList.innerHTML = ''; return; }
  if (!fuse) return;
  var results = fuse.search(this.value.trim(), { limit: 8 });
  if (results.length) {
    results.sort(function(a,b) { return a.score - b.score; });
    resList.innerHTML = results.map(function(r) {
      var item = r.item, score = Math.round((1-r.score)*100);
      return '<li class="post-entry"><header class="entry-header">' + item.title + '&nbsp;&raquo; <span class="search-score">(' + score + '% match)</span></header>' +
        '<div class="entry-summary">' + (item.summary ? item.summary.substring(0,100) + '...' : '') + '</div>' +
        '<a href="' + item.permalink + '" aria-label="' + item.title + '"></a></li>';
    }).join('');
  } else {
    resList.innerHTML = '<li class="no-results">No results found</li>';
  }
}

sInput.addEventListener('search', function() { if (!this.value) { resList.innerHTML = sInput.value = ''; sInput.focus(); } });
document.onkeydown = function(e) { if (e.key === 'Escape') { resList.innerHTML = sInput.value = ''; sInput.focus(); } };
</script>

<style>
.search-score {
    font-size: 0.8em;
    color: var(--secondary);
    font-weight: normal;
}

.entry-summary {
    font-size: 0.9em;
    color: var(--content);
    margin: 0.5rem 0;
    line-height: 1.4;
}

.no-results {
    padding: 1rem;
    color: var(--secondary);
    font-style: italic;
    list-style: none;
}

#searchResults .post-entry {
    margin-bottom: 1rem;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    position: relative;
}

#searchResults .post-entry:hover {
    background: var(--code-bg);
}

.tags-section {
    margin: 2rem 0;
}

.tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.tags-container a {
    text-decoration: none;
}

.tag-badge {
    display: inline-block;
    padding: 0.3rem 0.8rem;
    background: var(--entry);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.85rem;
    color: var(--primary);
    transition: all 0.2s;
}

.tag-badge:hover {
    background: var(--code-bg);
    border-color: var(--primary);
}

.tag-count {
    color: var(--secondary);
    font-size: 0.8em;
}
</style>

{{- end }}
